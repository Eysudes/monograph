<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monograph - PDF Viewer</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/white-book-logo.png">
    
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/fontawesome.css">
    <link rel="stylesheet" href="assets/css/animated.css">

    <style>
        .pdf-container {
            width: 100%;
            height: calc(100vh - 100px);
            border: 1px solid #ddd;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0;
            overflow: auto;
        }
        .pdf-container canvas {
            display: block;
            margin: auto;
        }
        .viewer-controls {
            background: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .pdf-info {
            font-weight: 600;
            color: #2a2a2a;
            flex: 1;
            min-width: 200px;
        }
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .control-buttons button {
            padding: 10px 18px;
            background: #8d99af;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .control-buttons button:hover {
            background: #6d7a8f;
            transform: translateY(-2px);
        }
        .control-buttons button:active {
            transform: translateY(0);
        }
        .page-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .page-controls button {
            padding: 8px 14px;
            background: #2a2a2a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }
        .page-controls button:hover:not(:disabled) {
            background: #1a1a1a;
        }
        .page-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .page-info {
            color: #2a2a2a;
            font-weight: 500;
            min-width: 100px;
            text-align: center;
        }
        .page-input {
            width: 90px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #2a2a2a;
        }
        .page-input:focus {
            outline: none;
            border-color: #8d99af;
            box-shadow: 0 0 0 2px rgba(141, 153, 175, 0.1);
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .action-buttons button {
            padding: 10px 18px;
            background: #8d99af;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .action-buttons button:hover {
            background: #6d7a8f;
        }
        .back-btn {
            background: #2a2a2a !important;
        }
        .back-btn:hover {
            background: #1a1a1a !important;
        }
        footer {
            background: #f8f9fa;
            padding: 40px 0;
            margin-top: 60px;
            border-top: 1px solid #ddd;
        }
        footer h4 {
            color: #2a2a2a;
            font-weight: 700;
            margin-bottom: 15px;
        }
        footer p {
            color: #666;
            font-size: 14px;
        }
        footer a {
            color: #8d99af;
            transition: color 0.3s ease;
        }
        footer a:hover {
            color: #6d7a8f;
        }
        .about .logo {
            margin-bottom: 15px;
        }
        .helpful-links a, .contact-us a {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .sub-footer {
            border-top: 1px solid #ddd;
            padding-top: 20px;
            margin-top: 30px;
            text-align: center;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>

  <!-- ***** Preloader Start ***** -->
  <div id="js-preloader" class="js-preloader">
    <div class="preloader-inner">
      <span class="dot"></span>
      <div class="dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <!-- ***** Preloader End ***** -->

    <div class="pdf-viewer-section">
        <div class="container-fluid" style="padding: 0; flex: 1; display: flex; flex-direction: column;">
            <div class="row" style="flex: 1; display: flex; flex-direction: column; margin: 0;">
                <div class="col-lg-12" style="flex: 1; display: flex; flex-direction: column; padding: 0;">
                    <div class="viewer-controls" style="border-radius: 0; margin-bottom: 0;">
                        <div class="pdf-info" id="pdfTitle">Loading PDF...</div>
                        <div class="control-group">
                            <div class="page-controls">
                                <button onclick="previousPage()" id="prevBtn">← Previous</button>
                                <input type="number" id="pageInput" class="page-input" min="1" placeholder="Go to..." onkeypress="if(event.key==='Enter') jumpToPage()">
                                <span class="page-info"><span id="currentPage">1</span> / <span id="totalPages">0</span></span>
                                <button onclick="nextPage()" id="nextBtn">Next →</button>
                            </div>
                            <div class="action-buttons">
                                <button onclick="zoomOut()">Zoom −</button>
                                <button onclick="zoomIn()">Zoom +</button>
                                <button onclick="downloadPDF()">Download</button>
                                <button class="back-btn" onclick="goBack()">← Library</button>
                            </div>
                        </div>
                    </div>
                    <div class="pdf-container" style="flex: 1;">
                        <canvas id="pdfCanvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <!-- Scripts -->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/animation.js"></script>
    <script src="assets/js/custom.js"></script>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Initialize PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let pageNum = 1;
        let pageRendering = false;
        let pageNumPending = null;
        let scale = 1.5;
        let canvas = document.getElementById('pdfCanvas');
        let ctx = canvas.getContext('2d');

        // Get PDF filename and subject from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const pdfFile = urlParams.get('file');
        const subject = urlParams.get('subject') || 'books'; // Default to 'books' for backward compatibility
        const year = urlParams.get('year') || ''; // Get year for path construction

        if (pdfFile) {
            const displayTitle = pdfFile.replace('.pdf', '').replace(/_/g, ' ');
            document.getElementById('pdfTitle').textContent = displayTitle;
            const pdfPath = year ? `books/${year}-year/${subject}/${pdfFile}` : `books/${subject}/${pdfFile}`;
            loadPDF(pdfPath);
        } else {
            document.getElementById('pdfTitle').textContent = 'No PDF specified';
        }

        function loadPDF(url) {
            pdfjsLib.getDocument(url).promise.then(function(pdf) {
                pdfDoc = pdf;
                document.getElementById('totalPages').textContent = pdf.numPages;
                renderPage(pageNum);
                updatePageButtons();
            }).catch(function(error) {
                console.error('Error loading PDF:', error);
                document.getElementById('pdfTitle').textContent = 'Error loading PDF';
            });
        }

        function renderPage(num) {
            if (!pdfDoc || num < 1 || num > pdfDoc.numPages) return;
            
            pageRendering = true;

            pdfDoc.getPage(num).then(function(page) {
                let viewport = page.getViewport({scale: scale});
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                let renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };

                let renderTask = page.render(renderContext);

                renderTask.promise.then(function() {
                    pageRendering = false;
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                    document.getElementById('currentPage').textContent = pageNum;
                    updatePageButtons();
                });
            });
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function nextPage() {
            if (pdfDoc && pageNum < pdfDoc.numPages) {
                pageNum++;
                queueRenderPage(pageNum);
            }
        }

        function previousPage() {
            if (pageNum > 1) {
                pageNum--;
                queueRenderPage(pageNum);
            }
        }

        function jumpToPage() {
            const pageInputElement = document.getElementById('pageInput');
            const inputValue = parseInt(pageInputElement.value);
            
            if (!isNaN(inputValue) && inputValue > 0 && pdfDoc && inputValue <= pdfDoc.numPages) {
                pageNum = inputValue;
                queueRenderPage(pageNum);
                pageInputElement.value = '';
            } else {
                pageInputElement.value = '';
            }
        }

        function updatePageButtons() {
            document.getElementById('prevBtn').disabled = pageNum <= 1;
            document.getElementById('nextBtn').disabled = pageNum >= (pdfDoc ? pdfDoc.numPages : 0);
        }

        function zoomIn() {
            scale += 0.25;
            renderPage(pageNum);
        }

        function zoomOut() {
            if (scale > 0.5) {
                scale -= 0.25;
                renderPage(pageNum);
            }
        }

        function downloadPDF() {
            if (pdfFile) {
                let link = document.createElement('a');
                link.href = year ? `books/${year}-year/${subject}/${pdfFile}` : `books/${subject}/${pdfFile}`;
                link.download = pdfFile;
                link.click();
            }
        }

        function goBack() {
            window.location.href = 'library.html';
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft' && pageNum > 1) {
                previousPage();
            } else if (e.key === 'ArrowRight' && pageNum < (pdfDoc ? pdfDoc.numPages : Infinity)) {
                nextPage();
            }
        });
    </script>
</body>
</html>
